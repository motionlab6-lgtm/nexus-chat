<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexus Chat</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { display: flex; height: 100vh; background-color: #111b21; justify-content: center; align-items: center; overflow: hidden; }
        
        /* ================= PREMIUM GLOWING LOGIN SCREEN ================= */
        .login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 50% 50%, #2b2d42 0%, #111115 100%); display: flex; justify-content: center; align-items: center; z-index: 100; transition: opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.5s; }
        .login-card { background: rgba(49, 51, 56, 0.85); backdrop-filter: blur(12px); width: 90%; max-width: 440px; padding: 40px 24px; border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,0.4), 0 0 100px rgba(88, 101, 242, 0.15); color: #b5bac1; text-align: center; border: 1px solid rgba(255,255,255,0.05); }
        .login-card h2 { color: #fff; font-size: 28px; margin-bottom: 8px; font-weight: 700; letter-spacing: -0.5px; }
        .login-card p { font-size: 14px; margin-bottom: 28px; color: #949ba4; }
        .form-group { text-align: left; margin-bottom: 24px; }
        .form-group label { display: block; font-size: 11px; font-weight: 700; color: #b5bac1; text-transform: uppercase; margin-bottom: 8px; letter-spacing: 0.8px; }
        .login-input { width: 100%; padding: 12px 14px; background-color: #1e1f22; border: 1px solid rgba(0,0,0,0.3); border-radius: 4px; color: #dbdee1; font-size: 16px; outline: none; transition: border-color 0.2s, box-shadow 0.2s; }
        .login-input:focus { border-color: #5865f2; box-shadow: 0 0 8px rgba(88, 101, 242, 0.4); }
        .login-btn { width: 100%; padding: 13px; background-color: #5865f2; color: #fff; border: none; border-radius: 4px; font-size: 15px; font-weight: 600; cursor: pointer; transition: background-color 0.2s, transform 0.1s; margin-top: 5px; box-shadow: 0 4px 12px rgba(88, 101, 242, 0.2); }
        .login-btn:hover { background-color: #4752c4; }

        /* ================= MAIN NEXUS APP WINDOW ================= */
        .app-window { display: flex; width: 100%; height: 100%; background-color: #fff; overflow: hidden; visibility: hidden; opacity: 0; transition: opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        
        /* ================= SIDEBAR STYLING ================= */
        .sidebar { width: 30%; max-width: 450px; min-width: 340px; background-color: #fff; border-right: 1px solid #e9edef; display: flex; flex-direction: column; }
        .sidebar-header { background-color: #f0f2f5; height: 60px; padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; }
        .avatar { width: 40px; height: 40px; background-color: #5865f2; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; text-transform: uppercase; font-size: 16px; flex-shrink: 0; }
        .app-title { font-weight: 700; color: #5865f2; font-size: 20px; letter-spacing: 0.5px; }
        .search-box { padding: 8px 12px; background-color: #fff; border-bottom: 1px solid #e9edef; display: flex; align-items: center; }
        .search-inner { background-color: #f0f2f5; width: 100%; padding: 6px 12px; border-radius: 8px; display: flex; }
        .search-inner input { width: 100%; border: none; background: transparent; outline: none; font-size: 14px; color: #111b21; }
        .chats-list { flex: 1; overflow-y: auto; background: #fff; }
        .chat-item { display: flex; padding: 12px 16px; align-items: center; background-color: #f0f2f5; border-bottom: 1px solid #e9edef; }
        .chat-item-info { flex: 1; margin-left: 15px; overflow: hidden; }
        .chat-item-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
        .chat-item-header h4 { font-size: 16px; color: #111b21; font-weight: 600; }
        .chat-item-time { font-size: 12px; color: #667781; }
        .chat-item-preview { font-size: 13px; color: #00a884; font-weight: 500; }

        /* ================= CHAT PANEL STYLING ================= */
        .chat-panel { flex: 1; display: flex; flex-direction: column; background-color: #efeae2; position: relative; }
        .chat-panel::before { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0.06; background-image: radial-gradient(#000 10%, transparent 10%), radial-gradient(#000 10%, transparent 10%); background-size: 20px 20px; background-position: 0 0, 10px 10px; pointer-events: none; }
        .chat-header { background-color: #f0f2f5; height: 60px; padding: 10px 16px; display: flex; align-items: center; border-bottom: 1px solid #e9edef; z-index: 10; justify-content: space-between; }
        .chat-header-left { display: flex; align-items: center; }
        .chat-header-info { margin-left: 15px; }
        .chat-header-info h4 { font-size: 16px; color: #111b21; font-weight: 500; }
        .chat-header-info p { font-size: 13px; color: #667781; }
        
        .chat-container { flex: 1; padding: 20px 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; z-index: 10; }
        .message { max-width: 75%; padding: 6px 10px 8px 10px; border-radius: 7px; font-size: 14.2px; line-height: 19px; color: #111b21; position: relative; box-shadow: 0 1px 0.5px rgba(11,20,26,.13); }
        .sent { background-color: #d9fdd3; align-self: flex-end; border-top-right-radius: 0; }
        .received { background-color: #ffffff; align-self: flex-start; border-top-left-radius: 0; }
        .username { font-size: 12px; color: #53bdeb; display: block; margin-bottom: 2px; font-weight: 600; }
        .sent .username { color: #5865f2; }

        .input-area { background-color: #f0f2f5; padding: 10px 16px; display: flex; align-items: center; gap: 8px; z-index: 10; }
        .input-area input { flex: 1; padding: 11px 14px; border: none; border-radius: 8px; outline: none; font-size: 15px; background-color: #ffffff; color: #111b21; }
        .input-area button { background-color: #5865f2; color: white; border: none; padding: 11px 20px; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 600; }

        /* ================= MOBILE DESIGN ADAPTATION ================= */
        @media (max-width: 768px) {
            body { padding: 0; }
            .sidebar { display: none; } /* Hides the sidebar completely on phones to mimic single active window */
            .message { max-width: 85%; } /* Gives messages slightly more width space on smaller screens */
        }
    </style>
</head>
<body>

    <div class="login-screen" id="loginScreen">
        <div class="login-card">
            <h2>Welcome to Nexus</h2>
            <p>Enter your name to access the main feed channel</p>
            <div class="form-group">
                <label>Display Name</label>
                <input type="text" id="usernameInput" class="login-input" placeholder="What should we call you?" autocomplete="off">
            </div>
            <button class="login-btn" id="loginBtn">Enter Nexus</button>
        </div>
    </div>

    <div class="app-window" id="appWindow">
        <div class="sidebar">
            <div class="sidebar-header">
                <div class="avatar" id="myAvatar">U</div>
                <div class="app-title">NEXUS</div>
                <div style="color: #54656f;">┇</div>
            </div>
            <div class="search-box">
                <div class="search-inner">
                    <input type="text" placeholder="Search or start a new chat">
                </div>
            </div>
            <div class="chats-list">
                <div class="chat-item">
                    <div class="avatar" style="background-color: #4e5058">N</div>
                    <div class="chat-item-info">
                        <div class="chat-item-header">
                            <h4>Global Lounge</h4>
                            <span class="chat-item-time">Live</span>
                        </div>
                        <div class="chat-item-preview">connected to feed...</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="chat-panel">
            <div class="chat-header">
                <div class="chat-header-left">
                    <div class="avatar" style="background-color: #5865f2;">N</div>
                    <div class="chat-header-info">
                        <h4>Global Lounge</h4>
                        <p>online</p>
                    </div>
                </div>
                <div style="color: #54656f;">🔍 ┇</div>
            </div>
            
            <div class="chat-container" id="chatContainer"></div>

            <div class="input-area">
                <input type="text" id="messageInput" placeholder="Type a message" autocomplete="off">
                <button id="sendBtn">Send</button>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let username = "";

        const loginScreen = document.getElementById('loginScreen');
        const appWindow = document.getElementById('appWindow');
        const loginBtn = document.getElementById('loginBtn');
        const usernameInput = document.getElementById('usernameInput');
        const chatContainer = document.getElementById('chatContainer');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');

        loginBtn.addEventListener('click', () => {
            username = usernameInput.value.trim();
            if (username !== "") {
                loginScreen.style.opacity = "0";
                loginScreen.style.visibility = "hidden";
                appWindow.style.visibility = "visible";
                appWindow.style.opacity = "1";
                document.getElementById('myAvatar').innerText = username.charAt(0);
                socket.emit('join room', 'global-lounge');
            } else {
                alert("Please enter a display name!");
            }
        });

        usernameInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') loginBtn.click();
        });

        function sendMessage() {
            const text = messageInput.value.trim();
            if (text !== '') {
                socket.emit('chat message', { user: username, text: text, room: 'global-lounge' });
                messageInput.value = '';
            }
        }

        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        socket.on('chat message', (data) => {
            const messageElement = document.createElement('div');
            messageElement.className = `message ${data.user === username ? 'sent' : 'received'}`;
            messageElement.innerHTML = `<span class="username">${data.user}</span>${data.text}`;
            chatContainer.appendChild(messageElement);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        });
    </script>
</body>
</html>
