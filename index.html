<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Discord Studio</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { display: flex; height: 100vh; background-color: #313338; color: #dbdee1; overflow: hidden; }
        
        /* ================= AUTH PRE-GATEWAY ================= */
        .login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: #1e1f22; display: flex; align-items: center; justify-content: center; z-index: 100; }
        .form-card { background-color: #313338; padding: 32px; border-radius: 8px; width: 100%; max-width: 480px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); text-align: center; }
        .form-card h2 { color: #fff; margin-bottom: 8px; font-size: 24px; }
        .form-card p { color: #b5bac1; font-size: 14px; margin-bottom: 20px; }
        .input-box { width: 100%; padding: 10px; margin-bottom: 16px; border-radius: 4px; border: none; background-color: #1e1f22; color: #fff; outline: none; }
        .submit-action { width: 100%; padding: 12px; border-radius: 4px; border: none; background-color: #5865f2; color: #fff; font-weight: 600; cursor: pointer; font-size: 14px; }
        .submit-action:hover { background-color: #4752c4; }

        /* ================= DISCORD 3-COLUMN WORKSPACE ================= */
        .app-window { display: flex; width: 100%; height: 100%; visibility: hidden; opacity: 0; transition: opacity 0.3s ease; }
        
        /* COLUMN 1: SERVER NAVIGATION NAV BAR */
        .guilds-nav { width: 72px; background-color: #1e1f22; display: flex; flex-direction: column; align-items: center; padding-top: 12px; gap: 8px; }
        .guild-circle { width: 48px; height: 48px; border-radius: 50%; background-color: #313338; display: flex; align-items: center; justify-content: center; color: #dbdee1; font-weight: bold; cursor: pointer; transition: all 0.2s ease; font-size: 16px; }
        .guild-circle:hover, .guild-circle.active { border-radius: 16px; background-color: #5865f2; color: #fff; }

        /* COLUMN 2: SUB-CHANNELS NAVIGATION BAR */
        .channels-sidebar { width: 240px; background-color: #2b2d31; display: flex; flex-direction: column; }
        .channels-header { height: 48px; border-bottom: 1px solid #1f2023; display: flex; align-items: center; padding: 0 16px; font-weight: bold; color: #fff; box-shadow: 0 1px 2px rgba(0,0,0,0.2); font-size: 15px; }
        .channels-list { flex: 1; padding: 8px; }
        .category-row { font-size: 12px; font-weight: 700; color: #949ba4; text-transform: uppercase; letter-spacing: 0.25px; padding: 8px; display: flex; align-items: center; }
        .channel-item { padding: 6px 8px; border-radius: 4px; color: #949ba4; cursor: pointer; margin-bottom: 2px; display: flex; align-items: center; gap: 6px; font-size: 14px; }
        .channel-item:hover { background-color: #35373c; color: #dbdee1; }
        .channel-item.active { background-color: #404249; color: #fff; }
        .channel-item span { color: #80848e; font-size: 18px; margin-right: 2px; }

        /* PROFILE FOLLOWER BADGE ACCENT */
        .user-footer-badge { height: 52px; background-color: #232428; display: flex; align-items: center; padding: 0 8px; gap: 8px; }
        .user-pfp { width: 32px; height: 32px; border-radius: 50%; background-color: #5865f2; color: #fff; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 14px; text-transform: uppercase; }
        .user-text-meta { flex: 1; overflow: hidden; }
        .user-text-meta h4 { font-size: 13px; color: #f2f3f5; font-weight: 600; text-overflow: ellipsis; overflow: hidden; }
        .user-text-meta p { font-size: 11px; color: #949ba4; }

        /* COLUMN 3: STAGE CONVERSATION INTERFACE */
        .chat-view-container { flex: 1; display: flex; flex-direction: column; background-color: #313338; }
        .chat-top-header { height: 48px; border-bottom: 1px solid #1f2023; display: flex; align-items: center; padding: 0 16px; font-weight: 600; color: #fff; box-shadow: 0 1px 2px rgba(0,0,0,0.2); font-size: 15px; gap: 8px; }
        .chat-top-header span { color: #80848e; font-size: 20px; }
        
        .messages-scrollable { flex: 1; padding: 16px; overflow-y: auto; display: flex; flex-direction: column; justify-content: flex-end; }
        .welcome-title-card { margin-bottom: auto; text-align: left; padding: 32px 0; }
        .welcome-title-card h1 { font-size: 32px; color: #fff; font-weight: 700; margin-bottom: 8px; }
        .welcome-title-card p { color: #949ba4; font-size: 14px; }

        .message-entry { display: flex; gap: 16px; margin-top: 16px; }
        .entry-avatar { width: 40px; height: 40px; border-radius: 50%; background-color: #4e5058; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #fff; text-transform: uppercase; }
        .entry-body { flex: 1; }
        .entry-header { display: flex; align-items: baseline; gap: 8px; }
        .entry-author { font-weight: 500; color: #f2f3f5; font-size: 15px; }
        .entry-timestamp { font-size: 12px; color: #949ba4; }
        .entry-text { font-size: 15px; color: #dbdee1; margin-top: 4px; line-height: 1.375; }

        /* MESSAGE BOX CONTAINER BUFFER */
        .bottom-form-wrapper { padding: 0 16px 24px 16px; }
        .input-bar-layout { background-color: #383a40; border-radius: 8px; padding: 11px 16px; display: flex; align-items: center; }
        .input-bar-layout input { flex: 1; background: transparent; border: none; outline: none; color: #dbdee1; font-size: 15px; }

        /* COLUMN 4: INLINE ACTIVE MEMBER SLIDER */
        .members-sidebar { width: 240px; background-color: #2b2d31; padding: 24px 8px 8px 16px; display: flex; flex-direction: column; gap: 16px; }
        .group-header { font-size: 12px; font-weight: 700; color: #949ba4; text-transform: uppercase; letter-spacing: 0.25px; margin-bottom: 4px; }
        .member-item-row { display: flex; align-items: center; gap: 12px; padding: 6px 8px; border-radius: 4px; cursor: pointer; }
        .member-item-row:hover { background-color: #35373c; }
        .member-avatar-status { width: 32px; height: 32px; border-radius: 50%; background-color: #232428; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #fff; font-size: 13px; }

        /* ADMIN DRAWER COMPONENT CARD PULLOUT */
        .admin-sidebar-card { background-color: #1e1f22; padding: 12px; border-radius: 8px; border: 1px solid #f23f43; display: none; margin-bottom: 12px; }
        .admin-sidebar-card h5 { font-size: 12px; font-weight: 700; color: #f23f43; text-transform: uppercase; margin-bottom: 8px; }
        .admin-select-input { width: 100%; padding: 6px; margin-bottom: 6px; border-radius: 4px; border: none; background-color: #2b2d31; color: #fff; font-size: 12px; outline: none; }
        .admin-submit-action { width: 100%; padding: 6px; border-radius: 4px; border: none; background-color: #f23f43; color: #fff; font-weight: 600; font-size: 12px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="login-screen" id="loginScreen">
        <div class="form-card">
            <h2>Welcome back!</h2>
            <p>We're so excited to see you again!</p>
            <input type="text" id="usernameInput" class="input-box" placeholder="Username (Type Shravan)">
            <input type="email" id="emailInput" class="input-box" placeholder="Email Address">
            <input type="password" id="passwordInput" class="input-box" placeholder="Password">
            <button class="submit-action" id="submitAuthBtn">Log In</button>
        </div>
    </div>

    <div class="app-window" id="appWindow">
        
        <div class="guilds-nav">
            <div class="guild-circle active">N</div>
            <div style="width: 32px; height: 2px; background-color: #35373c; border-radius: 1px; margin: 4px 0;"></div>
        </div>

        <div class="channels-sidebar">
            <div class="channels-header">Nexus Lounge</div>
            <div class="channels-list">
                <div class="category-row">Text Channels</div>
                <div class="channel-item active"><span>#</span>general</div>
                <div class="channel-item"><span>#</span>introductions</div>
                <div class="channel-item"><span>#</span>random</div>
            </div>
            <div class="user-footer-badge">
                <div class="user-pfp" id="footerAvatar">-</div>
                <div class="user-text-meta">
                    <h4 id="footerName">Loading...</h4>
                    <p>#0001</p>
                </div>
            </div>
        </div>

        <div class="chat-view-container">
            <div class="chat-top-header"><span>#</span> general</div>
            
            <div class="messages-scrollable" id="chatContainer">
                <div class="welcome-title-card">
                    <h1>Welcome to #general!</h1>
                    <p>This is the start of the #general channel.</p>
                </div>
                <div id="messagesStack"></div>
            </div>

            <div class="bottom-form-wrapper">
                <div class="input-bar-layout">
                    <input type="text" id="messageInput" placeholder="Message #general" autocomplete="off">
                </div>
            </div>
        </div>

        <div class="members-sidebar">
            <div class="admin-sidebar-card" id="ownerControlBlock">
                <h5>🛡️ Admin Directives</h5>
                <input type="text" id="adminTarget" class="admin-select-input" placeholder="User identity target">
                <select id="adminAction" class="admin-select-input">
                    <option value="ban">Ban User</option>
                    <option value="unban">Unban User</option>
                </select>
                <button class="admin-submit-action" id="executeAdminActionBtn">Execute Command</button>
            </div>

            <div>
                <div class="group-header">Online — 2</div>
                <div class="member-item-row">
                    <div class="member-avatar-status" style="background-color: #ff5a00;">🤖</div>
                    <div>
                        <h4 style="font-size: 14px; color: #ff5a00; font-weight: 500;">Nexus AI</h4>
                    </div>
                </div>
                <div class="member-item-row">
                    <div class="member-avatar-status" style="background-color: #4e5058;">M</div>
                    <div>
                        <h4 style="font-size: 14px; color: #dbdee1; font-weight: 500;">Motion Lab</h4>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let myUsername = "";

        const loginScreen = document.getElementById('loginScreen');
        const appWindow = document.getElementById('appWindow');
        const submitAuthBtn = document.getElementById('submitAuthBtn');
        const usernameInput = document.getElementById('usernameInput');
        const emailInput = document.getElementById('emailInput');
        const passwordInput = document.getElementById('passwordInput');
        const messagesStack = document.getElementById('messagesStack');
        const messageInput = document.getElementById('messageInput');
        const ownerControlBlock = document.getElementById('ownerControlBlock');

        submitAuthBtn.addEventListener('click', () => {
            const data = {
                email: emailInput.value.trim(),
                password: passwordInput.value,
                username: usernameInput.value.trim() || null
            };
            if(!data.email || !data.password) return alert("Email and Password parameters are mandatory.");
            socket.emit('auth user', data);
        });

        socket.on('auth error', (err) => alert(err));

        socket.on('auth success', (user) => {
            myUsername = user.username;
            loginScreen.style.display = "none";
            appWindow.style.visibility = "visible";
            appWindow.style.opacity = "1";
            
            document.getElementById('footerName').innerText = myUsername;
            document.getElementById('footerAvatar').innerText = myUsername.charAt(0);

            if (user.isAdmin) {
                ownerControlBlock.style.display = 'block';
            }
        });

        function dispatchMsg() {
            const text = messageInput.value.trim();
            if(text) {
                socket.emit('chat message', { text });
                messageInput.value = '';
            }
        }
        messageInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') dispatchMsg(); });

        socket.on('chat message', (data) => {
            const msgRow = document.createElement('div');
            msgRow.className = 'message-entry';
            msgRow.innerHTML = `
                <div class="entry-avatar">${data.user.charAt(0)}</div>
                <div class="entry-body">
                    <div class="entry-header">
                        <span class="entry-author">${data.user}</span>
                        <span class="entry-timestamp">Today at 5:32 PM</span>
                    </div>
                    <p class="entry-text">${data.text}</p>
                </div>
            `;
            messagesStack.appendChild(msgRow);
            document.getElementById('chatContainer').scrollTop = document.getElementById('chatContainer').scrollHeight;
        });

        document.getElementById('executeAdminActionBtn').addEventListener('click', () => {
            const target = document.getElementById('adminTarget').value.trim();
            const action = document.getElementById('adminAction').value;
            if(!target) return alert("Please specify a user identity.");
            socket.emit('admin command', { target, action });
            document.getElementById('adminTarget').value = '';
        });

        socket.on('admin response', (msg) => alert(msg));
    </script>
</body>
</html>
